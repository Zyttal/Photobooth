<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 1800" width="600" height="1800">
  <defs>
    <style>
      .label { font-family: 'Courier New', monospace; font-weight: bold; fill: #1a1a1a; }
      .accent { fill: #1a1a1a; }
    </style>
  </defs>
  <!-- Top label -->
  <text x="300" y="28" text-anchor="middle" class="label" font-size="20" letter-spacing="6">PHOTOBOOTH</text>
  <!-- Slot separators (thin black bands between slot rects, sized to match the gap) -->
  <rect x="40" y="430" width="520" height="30" class="accent"/>
  <rect x="40" y="850" width="520" height="30" class="accent"/>
  <rect x="40" y="1270" width="520" height="30" class="accent"/>
  <!-- Bottom date placeholder -->
  <text x="300" y="1730" text-anchor="middle" class="label" font-size="22" letter-spacing="4">★  MEMORIES  ★</text>
  <text x="300" y="1770" text-anchor="middle" class="label" font-size="14" letter-spacing="3" opacity="0.65">made with photobooth</text>
</svg>
