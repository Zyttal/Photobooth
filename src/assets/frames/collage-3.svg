<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" width="1200" height="800">
  <defs>
    <style>
      .head { font-family: 'Courier New', monospace; font-weight: bold; fill: #fff; }
    </style>
  </defs>

  <!-- Top title band: lives ABOVE the slots so user photos never sit under text. -->
  <text x="40" y="56" class="head" font-size="34" letter-spacing="8">★ TRIO</text>
  <text x="1160" y="56" text-anchor="end" class="head" font-size="14" letter-spacing="3" opacity="0.7">photobooth</text>
  <line x1="40" y1="78" x2="1160" y2="78" stroke="#ffffff" stroke-opacity="0.25" stroke-width="1"/>

  <!-- Bottom credit: BELOW the slots. -->
  <line x1="40" y1="772" x2="1160" y2="772" stroke="#ffffff" stroke-opacity="0.25" stroke-width="1"/>
  <text x="600" y="794" text-anchor="middle" class="head" font-size="11" letter-spacing="4" opacity="0.55">A THREE-PHOTO SET</text>

  <!-- Decorative pin-dots in the gutter between the left slot and the right two. -->
  <g fill="#ffffff" opacity="0.7">
    <circle cx="610" cy="240" r="3"/>
    <circle cx="610" cy="430" r="3"/>
    <circle cx="610" cy="620" r="3"/>
  </g>
</svg>
